<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codeforces Torture</title>
    <link href="popup.css" rel="stylesheet" />
  </head>
  <body>
    <h3>Codeforces Torture</h3>

    <div id="login-status">
      <span id="login-text"></span>
      <button id="login-btn" class="hidden">Login to Codeforces</button>
    </div>

    <div class="setup-view">
      <input type="number" id="minR" placeholder="Min rating (default 800)" />
      <input type="number" id="maxR" placeholder="Max rating (default 1200)" />
      <button type="submit" id="save-btn">Get Problem</button>
    </div>

    <div id="problem-view" class="hidden">
      <div class="problem-card">
        <strong id="prob-name"></strong><br />
        <span id="prob-rating"></span> Rating <br /><br />
        <a id="prob-link" target="_blank">Solve on Codeforces</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
